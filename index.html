<!doctype html>
<html lang="uz" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b6b67">
<meta name="description" content="Official portal of the National Center for Climate Change of the Republic of Uzbekistan.">
<title>National Climate Change Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="site.webmanifest">
<link rel="canonical" href="https://uznccc.uz/">
<link rel="stylesheet" href="assets/css/styles.css">
<script type="application/ld+json" id="orgSchema">{}</script>
<script defer src="assets/js/app.js"></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div class="page-chroma" aria-hidden="true">
  <div class="page-chroma__orb page-chroma__orb--one"></div>
  <div class="page-chroma__orb page-chroma__orb--two"></div>
  <div class="page-chroma__grid"></div>
</div>

<header class="site-header" id="top">
  <div class="container site-header__inner">
    <a class="brand" href="#home" aria-label="National Climate Change Center">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" role="presentation">
          <path d="M32 6C19.297 6 9 16.297 9 29c0 12.703 10.297 23 23 23 12.703 0 23-10.297 23-23C55 16.297 44.703 6 32 6Z" fill="currentColor" opacity=".18"/>
          <path d="M32 12c-9.389 0-17 7.611-17 17 0 9.389 7.611 17 17 17 9.389 0 17-7.611 17-17 0-9.389-7.611-17-17-17Z" stroke="currentColor" stroke-width="3"/>
          <path d="M20 34c4-8 8-12 12-12s8 4 12 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M32 16v12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="36" r="4" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand__copy">
        <strong id="brandTitle"></strong>
        <span id="brandSubtitle"></span>
      </span>
    </a>

    <nav class="site-nav" id="siteNav" aria-label="Primary"></nav>

    <div class="site-header__actions">
      <button class="icon-button icon-button--wide" id="searchToggle" type="button" aria-haspopup="dialog" aria-controls="searchDialog">
        <span class="icon-button__icon" aria-hidden="true">/</span>
        <span id="searchToggleText"></span>
      </button>

      <div class="lang-switch" aria-label="Language switcher">
        <button type="button" class="lang-switch__button" data-lang="uz">O'z</button>
        <button type="button" class="lang-switch__button" data-lang="ru">Рус</button>
        <button type="button" class="lang-switch__button" data-lang="en">En</button>
      </div>

      <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme">
        <span id="themeToggleGlyph" aria-hidden="true">◐</span>
      </button>

      <button class="icon-button menu-button" id="menuToggle" type="button" aria-expanded="false" aria-controls="mobilePanel">
        <span aria-hidden="true">☰</span>
      </button>
    </div>
  </div>

  <div class="mobile-panel" id="mobilePanel" hidden>
    <nav class="mobile-nav" id="mobileNav" aria-label="Mobile"></nav>
  </div>
</header>

<div class="page-alert" id="pageAlert" hidden></div>

<main id="main">
  <section class="section section--hero" id="home">
    <div class="container" id="homeContent"></div>
  </section>

  <section class="section" id="about">
    <div class="container" id="aboutContent"></div>
  </section>

  <section class="section" id="activities">
    <div class="container" id="activitiesContent"></div>
  </section>

  <section class="section" id="documents">
    <div class="container" id="documentsContent"></div>
  </section>

  <section class="section" id="news">
    <div class="container" id="newsContent"></div>
  </section>

  <section class="section" id="analytics">
    <div class="container" id="analyticsContent"></div>
  </section>

  <section class="section" id="media">
    <div class="container" id="mediaContent"></div>
  </section>

  <section class="section section--contacts" id="contacts">
    <div class="container" id="contactsContent"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container" id="footerContent"></div>
</footer>

<div class="search-dialog" id="searchDialog" hidden role="dialog" aria-modal="true" aria-labelledby="searchTitle">
  <div class="search-dialog__backdrop" data-close-search></div>
  <div class="search-dialog__surface">
    <div class="search-dialog__header">
      <div>
        <p class="section-kicker" id="searchEyebrow"></p>
        <h2 id="searchTitle"></h2>
      </div>
      <button class="icon-button" type="button" data-close-search aria-label="Close search">×</button>
    </div>

    <label class="search-field" for="globalSearchInput">
      <span class="visually-hidden" id="searchLabel"></span>
      <input id="globalSearchInput" type="search" autocomplete="off" spellcheck="false">
    </label>

    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

<noscript>
  <div class="noscript-banner">JavaScript is required to load multilingual content and live climate data.</div>
</noscript>
</body>
</html>
